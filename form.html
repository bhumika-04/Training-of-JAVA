<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

    <h2>Registration Form</h2>

    <form action="FormServlet" method="post">

        <label>Name:</label>
        <input type="text" name="name" />
        <br><br>

        <label>Email:</label>
        <input type="email" name="email" />
        <br><br>

        <label>Phone:</label>
        <input type="text" name="phone" />
        <br><br>

        <input type="submit" value="Submit" />

    </form>

</body>
</html>
